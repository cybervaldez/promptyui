<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptyUI — Try It</title>
<style>
:root {
    --bg-deep: #0a0a0a;
    --bg-surface: #161b22;
    --bg-elevated: #1c2128;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent-green: #3fb950;
    --accent-amber: #ff6b35;
    --accent-blue: #58a6ff;
    --accent-purple: #bc8cff;
    --reel-label: #e8943a;
    --reel-value: #529CCA;
    --reel-bg: rgba(82, 156, 202, 0.08);
    --font-mono: 'Courier New', Courier, monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: var(--font-mono);
    background: var(--bg-deep);
    color: var(--text-primary);
    overflow-x: hidden;
    overflow-y: auto;
}

/* ── Editor lines ── */
.editor-line {
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    line-height: 2.6em;
    white-space: nowrap;
    overflow: visible;
    color: var(--text-secondary);
    margin-top: 0.4em;
}

.editor-line--child {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}

.editor-line--child.visible {
    opacity: 1;
    transform: translateY(0);
}

.tree-connector {
    color: var(--text-muted);
    user-select: none;
    transition: color 0.3s ease;
}
.tree-connector.tree-active {
    color: var(--reel-label);
}

/* ── Inline reel ── */
.reel {
    display: inline-block;
    position: relative;
    vertical-align: middle;
    padding: 0 8px;
    border-radius: 4px;
    background: var(--reel-bg);
    overflow: visible;
    height: 1.6em;
    line-height: 1.6em;
}

.reel.interactive {
    cursor: pointer;
    transition: background 0.2s ease;
}

.reel.interactive:hover {
    background: rgba(82, 156, 202, 0.18);
}

.reel.interactive.popover-open {
    background: rgba(82, 156, 202, 0.22);
    outline: 1px solid rgba(82, 156, 202, 0.3);
}

.reel-badge {
    position: absolute;
    top: -0.55em;
    right: -0.65em;
    min-width: 1.3em;
    height: 1.3em;
    border-radius: 9999px;
    background: var(--bg-surface);
    color: var(--reel-label);
    font-size: 0.5em;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 0.3em;
    line-height: 1;
    pointer-events: none;
    z-index: 3;
}

.reel-label {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    text-align: center;
    color: var(--reel-label);
    font-size: inherit;
    line-height: 1.6em;
    white-space: nowrap;
    z-index: 2;
    pointer-events: none;
    transform-origin: center center;
    transform: translateY(0) scale(1);
    opacity: 1;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.15s ease;
}

.reel-label.float {
    transform: translateY(-1.3em) scale(0.55);
    opacity: 1;
}

.reel-window {
    display: block;
    overflow: hidden;
    width: 100%;
    height: 0;
    transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
}

.reel-window.open {
    height: 1.6em;
}

.reel-track {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.4s ease;
}

.reel-track.visible {
    opacity: 1;
}

.reel-item {
    white-space: nowrap;
    font-size: inherit;
    color: var(--reel-value);
    line-height: 1.6em;
    height: 1.6em;
    display: flex;
    align-items: center;
    justify-content: center;
}
.reel-item.placeholder {
    color: var(--text-muted);
    font-weight: 300;
}

/* ── Formula ── */
.demo-formula {
    font-size: clamp(0.75rem, 1.4vw, 1rem);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.5ch;
    flex-wrap: wrap;
    justify-content: center;
}

.formula-term {
    font-weight: 500;
}

.formula-count {
    opacity: 0.55;
}

.formula-x {
    color: var(--text-muted);
}
.formula-term-new {
    font-style: italic;
    animation: formulaFadeIn 0.3s ease-out forwards;
}
@keyframes formulaFadeIn {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 0.7; transform: translateY(0); }
}
.quill-count-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0.4rem;
}
.quill-count-delta {
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-weight: 500;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(3px);
    transition: opacity 0.3s ease-out, transform 0.3s ease-out;
}
.quill-count-delta.visible {
    opacity: 1;
    transform: translateY(0);
}

/* ── Big odometer count ── */
.demo-count {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    color: var(--accent-amber);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
}

.odo-wrap {
    display: inline-block;
    height: 1em;
    overflow: hidden;
    line-height: 1;
}

.odo-strip { display: block; }

.odo-d {
    display: block;
    height: 1em;
    line-height: 1;
    text-align: center;
}

.odo-comma { line-height: 1; }

.math-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.math-label.visible {
    opacity: 1;
}

/* ── Value popover ── */
.wc-popover {
    position: fixed;
    z-index: 100;
    background: var(--bg-elevated);
    border: 1px solid rgba(72, 79, 88, 0.5);
    border-radius: 8px;
    padding: 0.8rem;
    min-width: 200px;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.wc-popover-name {
    font-size: 0.7rem;
    color: var(--reel-label);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
}
.wc-popover-tab-landing {
    display: none;
    text-align: center;
    padding: 0.8em 0;
    font-size: 0.7rem;
    color: var(--text-muted);
}
.wc-popover-tab-landing kbd {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent-amber);
    background: rgba(255, 107, 53, 0.08);
    border: 1px solid rgba(255, 107, 53, 0.3);
    border-radius: 3px;
    padding: 0.15em 0.4em;
    line-height: 1;
    animation: hint-key-glow 2s ease-in-out infinite;
}
.wc-popover-tab-landing strong {
    color: var(--text-primary);
}
@media (prefers-reduced-motion: reduce) {
    .wc-popover-tab-landing kbd { animation: none; border-color: rgba(255, 107, 53, 0.5); }
}

.wc-popover-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-bottom: 0.5rem;
}

.wc-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.3em;
    font-size: 0.8rem;
    color: var(--reel-value);
    background: rgba(82, 156, 202, 0.1);
    border: 1px solid rgba(82, 156, 202, 0.2);
    border-radius: 3px;
    padding: 0.15em 0.4em;
}

.wc-pill-remove {
    cursor: pointer;
    color: var(--text-muted);
    font-size: 0.9em;
    line-height: 1;
    transition: color 0.15s;
}

.wc-pill-remove:hover {
    color: #f85149;
}

.wc-popover-input {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-primary);
    background: var(--bg-deep);
    border: 1px solid rgba(72, 79, 88, 0.4);
    border-radius: 4px;
    padding: 0.35em 0.5em;
    outline: none;
}

.wc-popover-input:focus {
    border-color: var(--reel-value);
}
/* ── Inline editor hint (floating below cursor) ── */
.q-edit-tip {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    padding-top: calc(0.6em + 15px);
    text-align: center;
    pointer-events: none;
    font-family: var(--font-mono);
    font-size: 0.55rem;
    color: var(--text-primary);
    opacity: 0.45;
    transition: opacity 0.3s ease;
    white-space: nowrap;
}
.q-edit-tip.hidden { opacity: 0; }
.q-edit-tip code { color: var(--text-secondary); }

.wc-popover-input::placeholder {
    color: var(--text-muted);
    font-size: 0.75rem;
}

/* ══════════════════════════════════════
   Quill Section
   ══════════════════════════════════════ */
.quill-section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6rem 2rem 4rem;
    border-top: 1px solid rgba(72, 79, 88, 0.2);
}

.quill-title {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 0.4rem;
}

.quill-subtitle {
    font-size: clamp(0.75rem, 1.4vw, 0.9rem);
    color: var(--text-muted);
    margin-bottom: 2.5rem;
}

.quill-editor-area {
    width: 100%;
    max-width: 700px;
    background: var(--bg-surface);
    border: 1px solid rgba(72, 79, 88, 0.3);
    border-radius: 8px;
    padding: 1.5rem 2rem;
}

.quill-blocks { min-height: 6em; overflow: visible; }

.q-block { position: relative; margin-bottom: 0.3em; overflow: visible; transition: margin-bottom 0.3s ease, opacity 0.3s ease; }
.q-block.editing { margin-bottom: 1.8em; }

.q-block-view {
    cursor: text;
    padding: 0.2em 0;
    border-radius: 4px;
    transition: background 0.15s;
}
.q-block-view:hover { background: rgba(72, 79, 88, 0.1); }
.q-block-edit { display: none; padding-bottom: 0; transition: padding-bottom 0.3s ease; }
.q-block.editing .q-block-view { display: none; }
.q-block.editing .q-block-edit {
    display: flex;
    align-items: baseline;
    position: relative;
    padding-bottom: 1.2em;
}
@keyframes border-shimmer {
    0%   { background-position: -100% 0, 0 0; }
    100% { background-position: 200% 0, 0 0; }
}
.q-block.editing .q-block-edit::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background:
        radial-gradient(ellipse 8% 100% at 50% 50%, rgba(82,156,202,0.9), transparent) no-repeat,
        linear-gradient(to right, transparent, var(--reel-value), transparent);
    background-size: 30% 100%, 100% 100%;
    background-position: -100% 0, 0 0;
    opacity: 0.4;
    animation: border-shimmer 0.9s 0.25s ease-out forwards;
}
.q-block.editing .q-block-actions {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(50%) translateY(4px);
    display: flex;
    gap: 0.6em;
    z-index: 4;
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
}
.q-block.editing .q-block-actions.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(50%);
}
.q-block-action {
    font-family: var(--font-mono);
    font-size: 8px;
    color: var(--text-secondary);
    background: var(--bg-surface);
    padding: 0.2em 0.5em;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    align-items: center;
    gap: 0.3em;
    touch-action: manipulation;
    transition: color 0.15s, background 0.15s;
}
.q-block-action:hover { color: var(--reel-value); }
.q-block-action:active { background: rgba(82, 156, 202, 0.1); }
.q-action-hint {
    font-size: 7px;
    color: var(--text-muted);
    text-transform: none;
}
@media (pointer: coarse) {
    .q-action-hint { display: none; }
}
@media (hover: none) {
    .q-action-hint { display: none; }
}
.q-block.tree-hidden {
    opacity: 0 !important;
    pointer-events: none;
}

.q-edit-connector {
    color: var(--text-muted);
    user-select: none;
    white-space: nowrap;
    line-height: 2.6em;
    flex-shrink: 0;
    margin-right: 0.5ch;
    transition: color 0.3s ease;
}
.q-edit-connector.tree-active {
    color: var(--reel-label);
}

.q-quill-wrap { flex: 1; min-width: 0; }

.q-block-edit .ql-container.ql-snow {
    border: none;
    font-family: var(--font-mono);
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    background: transparent;
    overflow: visible;
}
.q-block-edit .ql-editor {
    color: var(--text-secondary);
    padding: 0.2em 0;
    min-height: auto;
    line-height: 2.6em;
    caret-color: var(--accent-amber);
    overflow: visible;
    outline: none;
    position: relative;
}
.q-block-edit .ql-editor.ql-blank::before {
    content: attr(data-placeholder);
    color: var(--text-muted);
    font-style: italic;
    pointer-events: none;
    position: absolute;
    left: 0;
    right: 0;
}

.q-add-block {
    padding: 0.4em 0.2em;
    margin-top: 0.3em;
    color: var(--text-muted);
    font-size: clamp(0.8rem, 1.6vw, 0.95rem);
    font-style: italic;
    cursor: pointer;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    user-select: none;
    letter-spacing: 0.03em;
}
.q-add-block:hover {
    color: var(--text-secondary);
    background: rgba(72, 79, 88, 0.1);
}
.q-add-block:active {
    background: rgba(82, 156, 202, 0.08);
}

.ql-wildcard-chip {
    display: inline-block;
    position: relative;
    vertical-align: middle;
    padding: 0 8px;
    border-radius: 4px;
    background: var(--reel-bg);
    cursor: pointer;
    height: 1.6em;
    line-height: 1.6em;
    overflow: visible;
    transition: background 0.2s ease;
}
/* Quill Embed wraps content in an inline span — make it layout-transparent */
.ql-wildcard-chip > span:not([class]) {
    display: contents;
}
.ql-wildcard-chip:hover {
    background: rgba(82, 156, 202, 0.18);
}
.ql-wildcard-chip.popover-open {
    background: rgba(82, 156, 202, 0.22);
    outline: 1px solid rgba(82, 156, 202, 0.3);
}
.ql-wc-label {
    position: absolute;
    top: 0; left: 0; right: 0;
    text-align: center;
    color: var(--reel-label);
    font-family: var(--font-mono);
    font-size: inherit;
    line-height: 1.6em;
    white-space: nowrap;
    pointer-events: none;
    transform-origin: center center;
    transform: translateY(0) scale(1);
    opacity: 1;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.15s ease;
    z-index: 2;
}
.ql-wc-label.float {
    transform: translateY(-1.3em) scale(0.55);
    opacity: 1;
}
.ql-wc-window {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: block;
    overflow: hidden;
    height: 0;
    transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
}
.ql-wc-window.open {
    height: 1.6em;
}
.ql-wc-track {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.4s ease;
}
.ql-wc-track.visible {
    opacity: 1;
}
.ql-wc-item {
    white-space: nowrap;
    font-size: inherit;
    color: var(--reel-value);
    line-height: 1.6em;
    height: 1.6em;
    display: flex;
    align-items: center;
    justify-content: center;
}
.ql-wc-item.placeholder {
    color: var(--text-muted);
    font-size: 1.1em;
    font-style: normal;
    font-weight: 300;
}
.ql-wc-badge {
    position: absolute;
    top: -0.55em;
    right: -0.65em;
    min-width: 1.3em;
    height: 1.3em;
    border-radius: 9999px;
    background: var(--bg-surface);
    color: var(--reel-label);
    font-size: 0.5em;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 0.3em;
    line-height: 1;
    pointer-events: none;
    z-index: 10;
}

.quill-formula-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    margin-top: 2.5rem;
}
.quill-count { font-size: clamp(2rem, 5vw, 3.5rem); }
.q-save-continue-btn {
    margin-top: 1rem;
    padding: 0.5em 1.6em;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--text-primary);
    background: var(--bg-elevated);
    border: 1px solid var(--text-muted);
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
}
.q-save-continue-btn:hover {
    background: rgba(82, 156, 202, 0.12);
    border-color: var(--reel-value);
    color: var(--reel-value);
}

/* ═══════════════════════════════════════════
   Resolved Prompts Modal
   ═══════════════════════════════════════════ */
.resolved-modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
}
.resolved-modal {
    width: 90%;
    max-width: 700px;
    max-height: 85vh;
    background: var(--bg-surface);
    border: 1px solid rgba(72, 79, 88, 0.3);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
}
.resolved-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.2rem;
    border-bottom: 1px solid rgba(72, 79, 88, 0.2);
    flex-shrink: 0;
}
.resolved-modal-header h2 { margin: 0; font-size: 1rem; }
.resolved-modal-controls { display: flex; align-items: center; gap: 0.8em; }
.resolved-modal-count { font-size: 0.75rem; color: var(--text-muted); font-family: var(--font-mono); }
.resolved-modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.3rem;
    cursor: pointer;
    padding: 0 0.3em;
    line-height: 1;
}
.resolved-modal-close:hover { color: var(--text-primary); }
.resolved-sep-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.4em;
    font-family: var(--font-mono);
}
.resolved-sep-input {
    width: 4em;
    padding: 2px 4px;
    font-size: 0.7rem;
    font-family: var(--font-mono);
    background: var(--bg-elevated);
    border: 1px solid rgba(72, 79, 88, 0.4);
    border-radius: 3px;
    color: var(--text-primary);
    text-align: center;
}
.resolved-list-container {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
}
.resolved-list-container::-webkit-scrollbar { width: 6px; }
.resolved-list-container::-webkit-scrollbar-track { background: transparent; }
.resolved-list-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
.resolved-list-container::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
.resolved-item {
    padding: 0.6em 1em;
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--text-primary);
    border-bottom: 1px solid rgba(72, 79, 88, 0.15);
}
.resolved-item:last-child { border-bottom: none; }
.resolved-copy-btn {
    padding: 0.2em 0.8em;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid rgba(72, 79, 88, 0.4);
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
}
.resolved-copy-btn:hover { color: var(--reel-value); border-color: var(--reel-value); }
.resolved-all-cap {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    padding: 0.5em;

</style>

<body>

<div class="wc-popover" id="wc-popover" style="display: none;" data-testid="wc-popover">

<!-- ═══════════════════════════════════════════
     SECTION 2: Quill Editor
     ═══════════════════════════════════════════ -->
<section class="quill-section" id="quill-section">
